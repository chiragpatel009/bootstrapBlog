   <title>Bootstrap-blog</title>
</head>

<body>
   <!-- navbar section -->
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <a class="navbar-brand text-warning" href="/bootstrapBlog/">Bootstrap-blog</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
         aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
         <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
         <ul class="navbar-nav mr-auto">
            <li class="nav-item">
               <a class="nav-link" href="/bootstrapBlog/">Home <span class="sr-only">(current)</span></a>
            </li>
            <li class="nav-item">
               <a class="nav-link" href="/bootstrapBlog/about.html">About</a>
            </li>
            <li class="nav-item dropdown">
               <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown"
                  aria-haspopup="true" aria-expanded="false">
                  Topics
               </a>
               <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                  <a class="dropdown-item" href="#">Web development</a>
                  <a class="dropdown-item" href="#">Technology</a>
                  <div class="dropdown-divider"></div>
                  <a class="dropdown-item" href="#">Support</a>
                  <a class="dropdown-item" href="#">Write for us</a>
               </div>
            </li>
            <li class="nav-item">
               <a class="nav-link active" href="/bootstrapBlog/contact.html">Contact Us</a>
            </li>
         </ul>
         <form class="form-inline my-2 my-lg-0">
            <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-light my-2 my-sm-0" type="submit">Search</button>
         </form>
      </div>
   </nav>

   <!-- contact section -->
   <div class="container my-5">
      <h2>Contact Us</h2>
      <hr class="my-3">
      <form>
         <div class="form-group">
            <label for="emailaddress">Email address</label>
            <input type="email" class="form-control" id="emailaddress" placeholder="joie@gmail.com">
         </div>
         <div class="form-group">
            <label for="select-query">Select Your Query</label>
            <select class="form-control" id="select_query">
               <option class="text-muted">Select</option>
               <option>Web</option>
               <option>Tech Stack</option>
               <option>Technology</option>
               <option>Others</option>
            </select>
         </div>
         <div class="form-group row">
            <div class="col-sm-2">Are you a Member?</div>
            <div class="col-sm-10">
               <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="gridCheck1">
                  <label class="form-check-label" for="gridCheck1">
                     Yes
                  </label>
               </div>
            </div>
         </div>
         <div class="form-group row">
            <div class="col-sm-2">Are you a Professor?</div>
            <div class="col-sm-10">
               <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="gridCheck2">
                  <label class="form-check-label" for="gridCheck2">
                     Yes
                  </label>
               </div>
            </div>
         </div>
         <div class="form-group row">
            <div class="col-sm-2">Are you a Coder?</div>
            <div class="col-sm-10">
               <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="gridCheck3">
                  <label class="form-check-label" for="gridCheck2">
                     Yes
                  </label>
               </div>
            </div>
         </div>
         <div class="form-group">
            <label for="Textarea1">Tell us about yourself</label>
            <textarea class="form-control" id="Textarea1" rows="3"></textarea>
         </div>
         <div class="form-group">
            <label for="Textarea1">Elaborate Your Concert</label>
            <textarea class="form-control" id="Textarea2" rows="3"></textarea>
         </div>
         <button class="btn btn-primary">Submit</button>
      </form>
      <hr class="my-5">
   </div>

   <!-- footer section  -->
   <footer class="container">
      <p class="float-right"><a href="#">Back to top</a></p>

   </footer>

      crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns"
      crossorigin="anonymous"></script>
